  refresh: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
  chevron: '<path d="m9 18 6-6-6-6"/>',

  package: '<path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73Z"/><path d="M12 22V12"/><path d="M3.3 7 12 12l8.7-5"/><path d="m7.5 4.27 9 5.15"/>',
  phone: '<path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.832 1.62l-.46.353a1 1 0 0 0-.305 1.21 12.35 12.35 0 0 0 6.433 6.385"/>',

function icon(name, size = 16, extraClass = '') {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${extraClass}">${ICONS[name] || ''}</svg>`;
}

const FLOW_STEPS = [
  { key: "รอยืนยัน", label: "รอยืนยัน", icon: "clock" },
  { key: "ยืนยันแล้ว", label: "ยืนยันแล้ว", icon: "check" },
  { key: "รับงานแล้ว", label: "คนขับรับงาน", icon: "user" },
  { key: "เริ่มงานแล้ว", label: "ออกเดินทาง", icon: "truck" },
  { key: "ถึงลูกค้า", label: "ถึงหน้างาน", icon: "pin" },
  { key: "เสร็จงาน", label: "จัดส่งสำเร็จ", icon: "home" },
];

const EXCEPTION_STATUSES = {
  "ยกเลิก": { label: "ยกเลิก", icon: "x", tone: "danger" },
  "ไม่มีคนขับรับงาน": { label: "ไม่มีคนขับรับงาน", icon: "alert", tone: "warning" },
  "รอคนขับรับงาน": { label: "รอคนขับรับงาน", icon: "clock", tone: "amber" },
  "แจ้งเตือนแอดมิน": { label: "แจ้งเตือนแอดมิน", icon: "alert", tone: "warning" },
  "ถึงลาน": { label: "ถึงลานเท", icon: "warehouse", tone: "amber" },
};

const CUSTOMER_FLOW_STEPS = [
  { key: "รอยืนยัน", label: "รอยืนยัน", icon: "clock" },
  { key: "รับออเดอร์แล้ว", label: "รับออเดอร์แล้ว", icon: "check" },
  { key: "จัดหารถแล้ว", label: "จัดหารถแล้ว", icon: "user" },
  { key: "ออกเดินทาง", label: "ออกเดินทาง", icon: "truck" },
  { key: "ถึงหน้างาน", label: "ถึงหน้างาน", icon: "pin" },
  { key: "จัดส่งสำเร็จ", label: "จัดส่งสำเร็จ", icon: "home" },
];

function toCustomerStatus(rawStatus) {
  const map = {
    "รอยืนยัน": "รอยืนยัน",
    "ยืนยันแล้ว": "รับออเดอร์แล้ว",
    "รอคนขับรับงาน": "รับออเดอร์แล้ว",
    "ไม่มีคนขับรับงาน": "รับออเดอร์แล้ว",
    "แจ้งเตือนแอดมิน": "รับออเดอร์แล้ว",
    "รับงานแล้ว": "จัดหารถแล้ว",
    "ถึงลาน": "จัดหารถแล้ว",
    "เริ่มงานแล้ว": "ออกเดินทาง",
    "ถึงลูกค้า": "ถึงหน้างาน",
    "เสร็จงาน": "จัดส่งสำเร็จ",
    "ยกเลิก": "ยกเลิก",
  };
  return map[rawStatus] || "รอยืนยัน";
}

function toCustomerTimestamps(ts = {}) {
  return {
    "รอยืนยัน": ts["รอยืนยัน"],
    "รับออเดอร์แล้ว": ts["ยืนยันแล้ว"],
    "จัดหารถแล้ว": ts["รับงานแล้ว"],
    "ออกเดินทาง": ts["เริ่มงานแล้ว"],
    "ถึงหน้างาน": ts["ถึงลูกค้า"],
    "จัดส่งสำเร็จ": ts["เสร็จงาน"],
  };
}

const OWNER_TYPE_STYLES = {
  Owner: { label: "เจ้าของสวน", bar: "bg-emerald-500", chip: "bg-emerald-100 text-emerald-800" },
  Team:  { label: "ทีมตัด",     bar: "bg-orange-400",  chip: "bg-orange-100 text-orange-800" },
  Ramp:  { label: "ลานเท",      bar: "bg-amber-700",   chip: "bg-amber-100 text-amber-900" },
  Admin: { label: "แอดมิน",     bar: "bg-sky-300",     chip: "bg-sky-100 text-sky-800" },
};

function toneClasses(tone) {
  switch (tone) {
    case "danger":  return "bg-[#FCEBEB] text-[#791F1F] border-[#F09595]";
    case "warning": return "bg-[#FAEEDA] text-[#633806] border-[#EF9F27]";
    case "amber":   return "bg-[#FAEEDA] text-[#854F0B] border-[#FAC775]";
    default:        return "bg-stone-100 text-stone-700 border-stone-300";
  }
}

const DASHBOARD_STATUSES = [
  { key: "รอยืนยัน", label: "รอยืนยัน", tone: "amber" },
  { key: "ยืนยันแล้ว", label: "ยืนยันแล้ว", tone: "amber" },
  { key: "รับงานแล้ว", label: "คนขับรับงาน", tone: "amber" },
  { key: "เริ่มงานแล้ว", label: "ออกเดินทาง", tone: "amber" },
  { key: "ถึงลูกค้า", label: "ถึงหน้างาน", tone: "amber" },
  { key: "เสร็จงาน", label: "จัดส่งสำเร็จ", tone: "done" },
  { key: "ไม่มีคนขับรับงาน", label: "ไม่มีคนขับรับงาน", tone: "warning" },
  { key: "แจ้งเตือนแอดมิน", label: "แจ้งเตือนแอดมิน", tone: "warning" },
  { key: "ยกเลิก", label: "ยกเลิก", tone: "danger" },
];

const FILTER_CHIPS = [
  { key: "ทั้งหมด", label: "ทั้งหมด" },
  ...FLOW_STEPS.map(s => ({ key: s.key, label: s.label })),
  { key: "ไม่มีคนขับรับงาน", label: "ไม่มีคนขับรับงาน" },
  { key: "แจ้งเตือนแอดมิน", label: "แจ้งเตือนแอดมิน" },
  { key: "ยกเลิก", label: "ยกเลิก" },
];

const OWNER_TYPE_ORDER = ["Owner", "Team", "Ramp", "Admin"];

let ALL_ORDERS = [];
let CURRENT_ROLE = '';
let FILTER_STATUS = "ทั้งหมด";
let FILTER_OWNER_TYPE = null;
let EXPANDED_IDS = new Set();

// วันที่วันนี้ในรูปแบบ yyyy-MM-dd (ตาม timezone เครื่องผู้ใช้)
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
let FILTER_DATE = todayStr(); // default = วันนี้, '' = ทั้งหมด
let FILTER_DATE_END = ''; // ใช้เมื่อ DATE_RANGE_MODE = true
let DATE_RANGE_MODE = false; // false = เลือกวันเดียว, true = เลือกช่วงวันที่

function renderToneCard(tone) {
  switch (tone) {
    case "done":    return "bg-emerald-50 border-emerald-200 text-emerald-900";
    case "danger":  return "bg-[#FCEBEB] border-[#F09595] text-[#791F1F]";
    case "warning": return "bg-[#FAEEDA] border-[#EF9F27] text-[#633806]";
    default:        return "bg-amber-50 border-amber-200 text-amber-900";
  }
}

function statusBadgeHtml(status) {
  const exception = EXCEPTION_STATUSES[status];
  if (exception) {
    return `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${toneClasses(exception.tone)}">${icon(exception.icon, 13)}${exception.label}</span>`;
  }
  const idx = FLOW_STEPS.findIndex(s => s.key === status);
  const isDone = idx === FLOW_STEPS.length - 1;
  const isStart = idx <= 0;
  const cls = isDone ? "bg-emerald-100 text-emerald-800 border-emerald-300"
            : isStart ? "bg-amber-50 text-amber-800 border-amber-300"
            : "bg-amber-100 text-amber-900 border-amber-400";
  const label = FLOW_STEPS[idx] ? FLOW_STEPS[idx].label : status;
  return `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${cls}">${icon(isDone ? "check" : "clock", 13)}${label}</span>`;
}

function customerStatusBadgeHtml(rawStatus) {
  const custStatus = toCustomerStatus(rawStatus);
  if (custStatus === "ยกเลิก") {
    return `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${toneClasses("danger")}">${icon("x", 13)}ยกเลิก</span>`;
  }
  const idx = CUSTOMER_FLOW_STEPS.findIndex(s => s.key === custStatus);
  const isDone = idx === CUSTOMER_FLOW_STEPS.length - 1;
  const isStart = idx <= 0;
  const cls = isDone ? "bg-emerald-100 text-emerald-800 border-emerald-300"
            : isStart ? "bg-amber-50 text-amber-800 border-amber-300"
            : "bg-amber-100 text-amber-900 border-amber-400";
  const label = CUSTOMER_FLOW_STEPS[idx] ? CUSTOMER_FLOW_STEPS[idx].label : custStatus;
  return `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border ${cls}">${icon(isDone ? "check" : "clock", 13)}${label}</span>`;
}

function timelineHtml(status, timestamps, steps, cancelReason) {
  timestamps = timestamps || {};
  const isCancelled = status === "ยกเลิก";
  const exception = EXCEPTION_STATUSES[status];
  let currentIdx = steps.findIndex(s => s.key === status);
  const effectiveIdx = currentIdx === -1 ? 0 : currentIdx;

  let stepsHtml = steps.map((step, idx) => {
    const done = idx <= effectiveIdx && currentIdx !== -1;
    const isLast = idx === steps.length - 1;
    const ts = timestamps[step.key];
    const circleCls = done ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-amber-200 text-amber-400";
    const labelCls  = done ? "text-emerald-800" : "text-amber-700/60";
    const connectorCls = (idx < effectiveIdx && currentIdx !== -1) ? "bg-emerald-500" : "bg-amber-200";
    return `
      <div class="flex items-start min-w-fit">
        <div class="flex flex-col items-center gap-1.5">
          <div class="flex items-center justify-center w-9 h-9 rounded-full border-2 transition-colors ${circleCls}">${icon(step.icon, 16)}</div>
          <span class="text-[11px] font-medium text-center w-20 leading-tight ${labelCls}">${step.label}</span>
          <span class="text-[10px] text-amber-600/70 text-center w-20 leading-tight tabular-nums">${ts || "—"}</span>
        </div>
        ${!isLast ? `<div class="h-0.5 w-10 sm:w-16 mx-1 mt-[18px] rounded transition-colors ${connectorCls}"></div>` : ''}
      </div>`;
  }).join('');

  let footerHtml = '';
  if (isCancelled) {
    footerHtml = `
      <div class="flex items-start gap-2 text-xs font-medium px-3 py-2 rounded-xl border ${toneClasses("danger")}">
        ${icon("x", 14, "mt-0.5 shrink-0")}
        <span>ออเดอร์นี้ถูกยกเลิกแล้ว${cancelReason ? `<span class="block font-normal mt-0.5 opacity-90">เหตุผล: ${escapeHtml(cancelReason)}</span>` : ''}</span>
      </div>`;
  } else if (exception) {
    const msg = exception.label === "ถึงลานเท" ? "คนขับแวะลานเทก่อนไปจุดต่อไป" : "งานนี้ต้องการความช่วยเหลือจาก Admin";
    footerHtml = `
      <div class="flex items-center gap-2 text-xs font-medium px-3 py-2 rounded-xl border ${toneClasses(exception.tone)}">
        ${icon(exception.icon, 14)}${msg}
      </div>`;
  }

  return `
    <div class="space-y-2">
      <div class="flex items-start w-full overflow-x-auto pb-2 scrollbar-thin">${stepsHtml}</div>
      ${footerHtml}
    </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── ปุ่มตอบแทนลานเท — เฉพาะ Admin และออเดอร์สถานะ "แจ้งเตือนแอดมิน" ──
function rampApproveHtml(order, isAdmin) {
  if (!isAdmin || order.status !== 'แจ้งเตือนแอดมิน') return '';
  const oid = escapeHtml(order.orderId);
  return `
    <div class="ramp-approve bg-white border border-amber-300 rounded-xl px-3 py-3 space-y-2" data-order="${oid}">
      <p class="text-sm font-semibold text-amber-900 flex items-center gap-1.5">
        ${icon("warehouse", 15)}ลานเทไม่ตอบ — มีปาล์มที่ลานไหม?
      </p>
      <div class="flex gap-2">
        <button onclick="event.stopPropagation(); approveRamp('${oid}','มีปาล์ม', this)"
          class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg bg-emerald-600 text-white text-sm font-semibold hover:bg-emerald-700 transition-colors">
          ${icon("check", 15)}มีปาล์ม
        </button>
        <button onclick="event.stopPropagation(); approveRamp('${oid}','ไม่มีปาล์ม', this)"
          class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg bg-white border border-amber-300 text-amber-800 text-sm font-semibold hover:bg-amber-50 transition-colors">
          ${icon("x", 15)}ไม่มีปาล์ม
        </button>
      </div>
    </div>`;
}

function orderCardHtml(order, idx, isAdmin) {
  const expanded = EXPANDED_IDS.has(order.orderId);
  const ownerStyle = OWNER_TYPE_STYLES[order.ownerType];
  const custStatus = toCustomerStatus(order.status);

  let barHtml = '';
  let chipHtml = '';
  if (isAdmin && ownerStyle) {
    barHtml = `<div class="h-1.5 w-full ${ownerStyle.bar}"></div>`;
    chipHtml = `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${ownerStyle.chip}">${ownerStyle.label}</span>`;
  }

  const badgeHtml = isAdmin ? statusBadgeHtml(order.status) : customerStatusBadgeHtml(order.status);

  // ── ปุ่ม "หาคนขับ" — ขึ้นเฉพาะ Admin และออเดอร์ที่ยังไม่มีคนขับ/ต้องการความช่วยเหลือ ──
  const needDriver = isAdmin && ["ไม่มีคนขับรับงาน", "รอคนขับรับงาน", "แจ้งเตือนแอดมิน"].includes(order.status);
  const assignDriverHtml = needDriver ? `
    <a href="${ASSIGN_DRIVER_URL}" target="_blank" rel="noopener"
       onclick="event.stopPropagation()"
       class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-600 text-white text-xs font-semibold hover:bg-amber-700 transition-colors shrink-0">
      ${icon("user", 14)}หาคนขับ
    </a>` : '';

  let detailHtml = '';
  if (expanded) {
    let tlHtml;
    if (isAdmin) {
      tlHtml = timelineHtml(order.status, order.timestamps, FLOW_STEPS, order.cancelReason);
    } else {
      tlHtml = timelineHtml(custStatus, toCustomerTimestamps(order.timestamps), CUSTOMER_FLOW_STEPS, order.cancelReason);
    }

    const showDriver = order.driverName && custStatus !== "ยกเลิก" &&
      (custStatus === "จัดหารถแล้ว" || custStatus === "ออกเดินทาง" || custStatus === "ถึงหน้างาน" || custStatus === "จัดส่งสำเร็จ" || isAdmin);

    let driverHtml = '';
    if (showDriver) {
      driverHtml = `
        <div class="flex items-center justify-between gap-2 text-sm bg-white border border-amber-200 rounded-xl px-3 py-2 text-emerald-900">
          <span>${icon("truck", 14, "inline -mt-0.5 mr-1.5")}คนขับ: ${escapeHtml(order.driverName)} · ทะเบียน ${escapeHtml(order.plate || '')}</span>
          ${order.driverPhone ? `<a href="tel:${escapeHtml(order.driverPhone)}" onclick="event.stopPropagation()" class="flex items-center gap-1 shrink-0 px-2.5 py-1 rounded-lg bg-emerald-600 text-white text-xs font-semibold hover:bg-emerald-700 transition-colors">${icon("phone", 12)}${escapeHtml(order.driverPhone)}</a>` : ''}
        </div>`;
    }

    let rampHtml = '';
    if (isAdmin && order.rampInfo) {
      rampHtml = `
        <p class="text-sm bg-white border border-amber-200 rounded-xl px-3 py-2 text-amber-900">
          ${icon("warehouse", 14, "inline -mt-0.5 mr-1.5")}${escapeHtml(order.rampInfo)}
        </p>`;
    }

    detailHtml = `
      <div class="px-4 pb-4 border-t border-amber-100 pt-3 space-y-3 bg-amber-50/40">
        ${tlHtml}
        <div class="flex flex-wrap gap-x-6 gap-y-1 text-sm text-emerald-800/80">
          <span><span class="font-medium text-emerald-900">วันที่:</span> ${escapeHtml(order.date || '')} ${escapeHtml(order.time || '')}</span>
          <span><span class="font-medium text-emerald-900">จุดรับ:</span> ${escapeHtml(order.pickup || "—")}</span>
          <span><span class="font-medium text-emerald-900">จำนวนกระบะ:</span> ${escapeHtml(String(order.binCount || 1))} ใบ</span>
        </div>
        ${driverHtml}
        ${rampHtml}
        ${rampApproveHtml(order, isAdmin)}
      </div>`;
  }

  return `
    <div class="bg-white rounded-2xl border border-amber-200 shadow-sm hover:shadow-md transition-shadow overflow-hidden">
      ${barHtml}
      <button onclick="toggleOrder('${escapeHtml(order.orderId)}')" class="w-full flex items-center justify-between gap-3 p-4 text-left flex-wrap sm:flex-nowrap">
        <div class="flex items-center gap-3 min-w-0">
          <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-emerald-50 text-emerald-700 shrink-0">${icon("package", 20)}</div>
          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <p class="font-semibold text-emerald-900 break-all">${escapeHtml(order.orderId)}</p>
              ${chipHtml}
            </div>
            <p class="text-sm text-amber-700/80 truncate">${escapeHtml(order.gardenName || '')}${order.billName ? ` · ${escapeHtml(order.billName)}` : ""}</p>
          </div>
        </div>
        ${assignDriverHtml}
        <div class="flex items-center gap-2 shrink-0 ml-auto">
          ${badgeHtml}
          ${icon("chevron", 18, `text-amber-400 transition-transform ${expanded ? "rotate-90" : ""}`)}
        </div>
      </button>
      ${detailHtml}
    </div>`;
}

function toggleOrder(orderId) {
  if (EXPANDED_IDS.has(orderId)) EXPANDED_IDS.delete(orderId);
  else EXPANDED_IDS.add(orderId);
  render();
}

function dashboardHtml(orders, statuses, getKey) {
  const counts = {};
  statuses.forEach(s => counts[s.key] = 0);
  orders.forEach(o => {
    const k = getKey(o);
    if (counts[k] !== undefined) counts[k]++;
  });

  return `<div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 xl:grid-cols-9 gap-3">
    ${statuses.map(s => {
      const active = FILTER_STATUS === s.key;
      return `
        <button onclick="selectStatus('${escapeHtml(s.key)}')" class="text-left rounded-2xl border p-3 transition-all ${renderToneCard(s.tone)} ${active ? "ring-2 ring-emerald-500 ring-offset-1" : "hover:shadow-sm"}">
          <p class="text-2xl font-bold leading-none">${counts[s.key]}</p>
          <p class="text-xs font-medium mt-1.5 leading-tight">${escapeHtml(s.label)}</p>
        </button>`;
    }).join('')}
  </div>`;
}

function ownerTypeDashboardHtml(orders) {
  const counts = { Owner: 0, Team: 0, Ramp: 0, Admin: 0 };
  orders.forEach(o => { if (counts[o.ownerType] !== undefined) counts[o.ownerType]++; });

  const allActive = FILTER_OWNER_TYPE === null;
  let html = `<div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
    <button onclick="selectOwnerType(null)" class="text-left rounded-2xl border border-amber-200 bg-white p-3 transition-all overflow-hidden ${allActive ? "ring-2 ring-emerald-500 ring-offset-1" : "hover:shadow-sm"}">
      <div class="h-1.5 w-full rounded-full mb-2 bg-amber-300"></div>
      <p class="text-2xl font-bold leading-none text-emerald-900">${orders.length}</p>
      <p class="text-xs font-medium mt-1.5 leading-tight text-amber-700/80">ทั้งหมด</p>
    </button>`;

  OWNER_TYPE_ORDER.forEach(key => {
    const style = OWNER_TYPE_STYLES[key];
    const active = FILTER_OWNER_TYPE === key;
    html += `
      <button onclick="selectOwnerType('${key}')" class="text-left rounded-2xl border border-amber-200 bg-white p-3 transition-all overflow-hidden ${active ? "ring-2 ring-emerald-500 ring-offset-1" : "hover:shadow-sm"}">
        <div class="h-1.5 w-full rounded-full mb-2 ${style.bar}"></div>
        <p class="text-2xl font-bold leading-none text-emerald-900">${counts[key]}</p>
        <p class="text-xs font-medium mt-1.5 leading-tight text-amber-700/80">${style.label}</p>
      </button>`;
  });

  html += `</div>`;
  return html;
}

function filterChipsHtml(chips) {
  return `<div class="flex flex-wrap gap-2 overflow-x-auto pb-1 scrollbar-thin">
    ${chips.map(c => {
      const active = FILTER_STATUS === c.key;
      const cls = active ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-amber-200 text-emerald-800 hover:bg-amber-50";
      return `<button onclick="selectStatus('${escapeHtml(c.key)}')" class="px-3.5 py-1.5 rounded-full text-sm font-medium border transition-colors whitespace-nowrap ${cls}">${escapeHtml(c.label)}</button>`;
    }).join('')}
  </div>`;
}

function selectStatus(key) {
  FILTER_STATUS = (FILTER_STATUS === key) ? "ทั้งหมด" : key;
  render();
}

function selectOwnerType(key) {
  FILTER_OWNER_TYPE = (FILTER_OWNER_TYPE === key || key === null) ? null : key;
  render();
}

function selectDate(val) {
  FILTER_DATE = (val === 'today') ? todayStr() : val; // '' = ทั้งหมด
  if (DATE_RANGE_MODE && FILTER_DATE_END && FILTER_DATE && FILTER_DATE_END < FILTER_DATE) {
    FILTER_DATE_END = FILTER_DATE;
  }
  render();
}

function selectDateEnd(val) {
  FILTER_DATE_END = val;
  if (FILTER_DATE_END && FILTER_DATE && FILTER_DATE_END < FILTER_DATE) {
    FILTER_DATE = FILTER_DATE_END;
  }
  render();
}

function toggleDateRange() {
  DATE_RANGE_MODE = !DATE_RANGE_MODE;
  if (DATE_RANGE_MODE) {
    if (!FILTER_DATE) FILTER_DATE = todayStr();
    if (!FILTER_DATE_END) FILTER_DATE_END = FILTER_DATE;
  } else {
    FILTER_DATE_END = '';
  }
  render();
}

function dateLabelHtml() {
  if (!FILTER_DATE) return '';
  if (DATE_RANGE_MODE && FILTER_DATE_END && FILTER_DATE_END !== FILTER_DATE) {
    return ` <span class="text-amber-700">· ${formatDateDMY(FILTER_DATE)} – ${formatDateDMY(FILTER_DATE_END)}</span>`;
  }
  const label = (FILTER_DATE === todayStr()) ? 'วันนี้' : formatDateDMY(FILTER_DATE);
  return ` <span class="text-amber-700">· ${escapeHtml(label)}</span>`;
}

// แปลง "yyyy-MM-dd" → "dd-MM-yyyy"
function formatDateDMY(dateStr) {
  if (!dateStr) return '';
  const parts = String(dateStr).split('-');
  if (parts.length !== 3) return escapeHtml(dateStr);
  const [y, m, d] = parts;
  return `${d}-${m}-${y}`;
}

// ตรวจว่า order.date อยู่ในช่วงที่เลือกหรือไม่
function matchesDateFilter(orderDate) {
  if (!FILTER_DATE) return true;
  if (DATE_RANGE_MODE && FILTER_DATE_END) {
    return orderDate >= FILTER_DATE && orderDate <= FILTER_DATE_END;
  }
  return orderDate === FILTER_DATE;
}

// ====== Main render ======
function render() {
  const isAdmin = CURRENT_ROLE === 'Admin';

  let orders = ALL_ORDERS.filter(o => matchesDateFilter(o.date));
  if (isAdmin && FILTER_STATUS !== "ทั้งหมด") {
    orders = orders.filter(o => o.status === FILTER_STATUS);
  }
  if (isAdmin && FILTER_OWNER_TYPE) {
    orders = orders.filter(o => o.ownerType === FILTER_OWNER_TYPE);
  }

  const roleLabel = { Owner: 'เจ้าของสวน', Team: 'ทีมตัด', Ramp: 'ลานเท', Admin: 'แอดมิน' }[CURRENT_ROLE] || CURRENT_ROLE;

  let html = '';

  html += `
    <div class="bg-gradient-to-r from-emerald-700 to-emerald-600 rounded-2xl p-5 shadow-lg text-white">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-2">${icon("truck", 24)}ติดตามสถานะออเดอร์</h1>
          <p class="text-emerald-100 text-sm mt-1">SSB Smart Supply · ${escapeHtml(roleLabel)}</p>
        </div>
        <button onclick="loadOrders(true)" id="refresh-btn" class="flex items-center gap-2 bg-white/15 hover:bg-white/25 transition-colors rounded-xl px-3 py-2 text-sm font-medium">
          ${icon("refresh", 16, "refresh-icon")}อัปเดตข้อมูล
        </button>
      </div>
    </div>`;

  // ── ตัวเลือกวันที่ ──────────────────────────────────────
  html += `
    <div class="flex items-center gap-2 flex-wrap">
      <input type="date" value="${escapeHtml(FILTER_DATE || todayStr())}"
        oninput="selectDate(this.value)"
        class="px-3 py-2 rounded-xl text-sm font-medium border bg-white border-amber-200 text-emerald-900 focus:outline-none focus:ring-2 focus:ring-emerald-400 ${FILTER_DATE ? '' : 'opacity-50'}" />
      ${DATE_RANGE_MODE ? `
        <span class="text-amber-700 text-sm">ถึง</span>
        <input type="date" value="${escapeHtml(FILTER_DATE_END || FILTER_DATE || todayStr())}"
          min="${escapeHtml(FILTER_DATE || '')}"
          oninput="selectDateEnd(this.value)"
          class="px-3 py-2 rounded-xl text-sm font-medium border bg-white border-amber-200 text-emerald-900 focus:outline-none focus:ring-2 focus:ring-emerald-400" />
      ` : ''}
      <button onclick="selectDate('today')" class="px-3 py-2 rounded-xl text-sm font-medium border transition-colors ${(!DATE_RANGE_MODE && FILTER_DATE === todayStr()) ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-amber-200 text-emerald-800 hover:bg-amber-50"}">
        วันนี้
      </button>
      <button onclick="selectDate('')" class="px-3 py-2 rounded-xl text-sm font-medium border transition-colors ${!FILTER_DATE ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-amber-200 text-emerald-800 hover:bg-amber-50"}">
        ทั้งหมด
      </button>
      <button onclick="toggleDateRange()" class="px-3 py-2 rounded-xl text-sm font-medium border transition-colors ${DATE_RANGE_MODE ? "bg-emerald-600 border-emerald-600 text-white" : "bg-white border-amber-200 text-emerald-800 hover:bg-amber-50"}">
        ${icon("calendar", 14, "inline -mt-0.5 mr-1")}ช่วงวันที่
      </button>
    </div>`;

  // ออเดอร์ตามวันที่เลือก (ก่อน filter สถานะ/ผู้สั่ง) — ใช้สำหรับนับในแดชบอร์ด
  const dateFilteredOrders = ALL_ORDERS.filter(o => matchesDateFilter(o.date));

  if (isAdmin) {
    html += `
      <div class="space-y-2">
        <p class="text-sm font-semibold text-emerald-900 px-1">ออเดอร์แยกตามผู้สั่ง</p>
        ${ownerTypeDashboardHtml(dateFilteredOrders)}
      </div>`;

    html += `
      <div class="space-y-2">
        <p class="text-sm font-semibold text-emerald-900 px-1">สรุปสถานะ</p>
        ${dashboardHtml(dateFilteredOrders, DASHBOARD_STATUSES, o => o.status)}
      </div>`;

    html += `
      <div class="space-y-2">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <p class="text-sm text-emerald-900 font-medium">
            แสดง ${orders.length} ออเดอร์${dateLabelHtml()}
            ${FILTER_OWNER_TYPE ? `<span class="text-amber-700"> · ${OWNER_TYPE_STYLES[FILTER_OWNER_TYPE].label}</span>` : ''}
          </p>
        </div>
        ${filterChipsHtml(FILTER_CHIPS)}
      </div>`;
  } else {
    html += `
      <p class="text-sm text-emerald-900 font-medium px-1">
        แสดง ${orders.length} ออเดอร์${dateLabelHtml()}<span class="text-amber-700"> · เฉพาะของคุณ</span>
      </p>`;
  }

  html += `<div class="space-y-3">`;
  if (orders.length === 0) {
    html += `<div class="bg-white rounded-2xl border border-amber-200 p-8 text-center text-amber-600">ไม่มีออเดอร์ในสถานะนี้</div>`;
  } else {
    orders.forEach((o, idx) => { html += orderCardHtml(o, idx, isAdmin); });
  }
  html += `</div>`;

  html += `
    <div class="text-center text-xs text-emerald-700/60 pt-2 pb-4">
      ข้อมูลจาก Google Sheet "STATUS" ผ่าน Apps Script API · อัปเดตล่าสุดอัตโนมัติ
    </div>`;

  document.getElementById('app').innerHTML = html;
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    window._userId = profile.userId;
    await loadOrders(false);
  } catch (e) {
    console.error(e);
    document.getElementById('loading').innerHTML = `<p class="text-sm text-red-600 px-6 text-center">โหลดไม่สำเร็จ: ${escapeHtml(e.message || String(e))}</p>`;
  }
}

async function loadOrders(isRefresh) {
  const btn = document.getElementById('refresh-btn');
  if (isRefresh && btn) btn.querySelector('.refresh-icon').classList.add('spin');

  try {
    const res = await fetch(`${GAS_URL}?action=getOrderTracker&userId=${window._userId}`);
    const data = await res.json();

    if (!data.success) {
      document.getElementById('app').innerHTML = `<div class="bg-white rounded-2xl border border-amber-200 p-8 text-center text-amber-700 mt-6">${escapeHtml(data.error || 'เกิดข้อผิดพลาด')}</div>`;
      document.getElementById('loading').style.display = 'none';
      return;
    }

    ALL_ORDERS = data.orders || [];
    CURRENT_ROLE = data.role;
    render();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    console.error(e);
    if (!isRefresh) {
      document.getElementById('loading').innerHTML = `<p class="text-sm text-red-600 px-6 text-center">เชื่อมต่อไม่ได้</p>`;
    }
  } finally {
    if (isRefresh && btn) setTimeout(() => btn.querySelector('.refresh-icon').classList.remove('spin'), 400);
  }
}

// ── ตอบแทนลานเท (มีปาล์ม/ไม่มีปาล์ม) จากหน้า tracker ──────────
async function approveRamp(orderId, answer, btn) {
  if (!confirm(`ยืนยันตอบแทนลานเท: "${answer}" ?`)) return;
  const wrap = btn.closest('.ramp-approve');
  wrap.querySelectorAll('button').forEach(b => b.disabled = true);
  btn.innerHTML = 'กำลังบันทึก...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // กัน CORS preflight ของ GAS
      body: JSON.stringify({
        action: 'adminApproveRamp',
        orderId: orderId,
        answer:  answer,
        userId:  window._userId
      })
    });
    const data = await res.json();
    if (data && data.success) {
      wrap.innerHTML = `<p class="text-sm font-semibold text-emerald-700 flex items-center gap-1.5">${icon("check", 15)}บันทึก "${escapeHtml(answer)}" และกระจายงานให้คนขับแล้ว</p>`;
      setTimeout(() => loadOrders(true), 1200); // โหลดใหม่ ให้สถานะอัปเดต
    } else {
      alert('ไม่สำเร็จ: ' + ((data && data.error) || 'unknown'));
      render(); // คืนปุ่มกลับ
    }
  } catch (e) {
    alert('เกิดข้อผิดพลาด: ' + (e.message || e));
    render();
  }
}

init();
</script>

</body>
</html>
